server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* → backend:8000/* (strips the /api prefix)
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # All other requests → index.html (React handles routing client-side)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
